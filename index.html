<!doctype html>
<html lang="en" data-theme="premium">
  <head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Shalimar Fashions · Cash Counter</title>
    <script>
      (function () {
        var hash = location.hash ? location.hash.slice(1) : ''
        if (hash) {
          var path = hash
          try {
            if (path.indexOf('%') >= 0) path = decodeURIComponent(path)
          } catch (e) {}
          path = path.replace(/\/+/g, '/')
          if (path !== hash) {
            location.replace(location.pathname + '#' + path + location.search)
            return
          }
        }
        if (!location.hash && location.pathname && location.pathname !== '/') {
          location.replace('/#' + location.pathname + location.search)
        }
      })()
    </script>
    <script>
      (function () {
        var w = innerWidth
        var h = innerHeight
        var t = matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 1
        var s = w < 768 ? 'phone' : w < 1280 || (t && w < 1400) ? 'tablet' : 'desktop'
        var d = document.documentElement
        d.dataset.screen = s
        var short = (s === 'phone' && h < 700) || (s === 'tablet' && h < 850) || (s === 'desktop' && h < 750)
        var uiPad = s === 'phone' ? (short ? 4 : 6) : s === 'tablet' ? (short || w > h ? 5 : 8) : 10
        var hdr = s === 'phone' ? (short ? 72 : 82) : s === 'tablet' ? (short ? 62 : 70) : (short ? 72 : 80)
        d.style.setProperty('--app-width', w + 'px')
        d.style.setProperty('--app-height', h + 'px')
        d.style.setProperty('--counter-height', Math.max(320, h - hdr - uiPad * 2) + 'px')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
