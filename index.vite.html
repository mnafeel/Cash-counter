<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5c382a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Shalimar Fashions · Cash Counter</title>
    <script>
      (function () {
        var w = innerWidth
        var h = innerHeight
        var t = matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 1
        var s = w < 768 ? 'phone' : w < 1280 || (t && w < 1400) ? 'tablet' : 'desktop'
        var d = document.documentElement
        d.dataset.screen = s
        d.style.setProperty('--app-width', w + 'px')
        d.style.setProperty('--app-height', h + 'px')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
